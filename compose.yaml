volumes:
  sockets:
  tor:

services:
  nginx:
    image: nginx:1.31
    ports:
      - "4010:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../shimmie2:/var/www/html
    depends_on:
      - php-fpm
  php-fpm:
    image: php:8.5-fpm
    volumes:
      - ../shimmie2:/var/www/html

  nginx-subdir:
    image: nginx:1.31
    ports:
      - "4011:80"
    volumes:
      - ./nginx-subdir.conf:/etc/nginx/nginx.conf:ro
      - ../shimmie2:/var/www/html/gallery
    depends_on:
      - php-fpm-subdir
  php-fpm-subdir:
    image: php:8.5-fpm
    volumes:
      - ../shimmie2:/var/www/html/gallery

  lighttpd:
    build:
      dockerfile_inline: |
        FROM alpine:3.24
        RUN apk add lighttpd php85-cgi php85-pdo_sqlite php85-fileinfo
        CMD ["lighttpd", "-D", "-f", "/etc/lighttpd.conf"]
    ports:
      - "4020:80"
    volumes:
      - ./lighttpd.conf:/etc/lighttpd.conf:ro
      - ../shimmie2:/var/www/html

  lighttpd-subdir:
    build:
      dockerfile_inline: |
        FROM alpine:3.24
        RUN apk add lighttpd php85-cgi php85-pdo_sqlite php85-fileinfo
        CMD ["lighttpd", "-D", "-f", "/etc/lighttpd.conf"]
    ports:
      - "4021:80"
    volumes:
      - ./lighttpd-subdir.conf:/etc/lighttpd.conf:ro
      - ../shimmie2:/var/www/html/gallery

  varnish:
    image: varnish:9
    ports:
      - "4030:80"
    volumes:
      - ./varnish.vcl:/etc/varnish/default.vcl:ro
    depends_on:
      - nginx

  tor:
    image: barneybuffet/tor:latest
    ports:
      - "4031:9050"
    volumes:
      - sockets:/var/sockets
      - tor:/tor/hidden_services/
    depends_on:
      - tor-nginx
    environment:
      TOR_SERVICE: true
      TOR_SERVICE_HOSTS: "shimmie=80:unix:/var/sockets/nginx.sock"
      TOR_PROXY: true
      TOR_PROXY_PORT: 0.0.0.0:9050
      TOR_PROXY_ACCEPT: "accept 127.0.0.1,accept 10.0.0.0/8,accept 172.16.0.0/12,accept 192.168.0.0/16"
  tor-nginx:
    image: nginx:alpine
    volumes:
      - sockets:/var/sockets
      - ./tor-nginx.conf:/etc/nginx/nginx.conf:ro
      - ../shimmie2:/var/www/html
    depends_on:
      - tor-php-fpm
  tor-php-fpm:
    image: php:8.5-fpm
    volumes:
      - ../shimmie2:/var/www/html

  apache:
    build:
      dockerfile_inline: |
        FROM php:8.5-apache
        RUN a2enmod dir rewrite expires headers deflate
    ports:
      - "4040:80"
    volumes:
      - ../shimmie2:/var/www/html
      - ./apache.vhost:/etc/apache2/sites-enabled/000-default.conf

  apache-subdir:
    build:
      dockerfile_inline: |
        FROM php:8.5-apache
        RUN a2enmod dir rewrite expires headers deflate
    ports:
      - "4041:80"
    volumes:
      - ../shimmie2:/var/www/html/gallery
      - ./apache.vhost:/etc/apache2/sites-enabled/000-default.conf
